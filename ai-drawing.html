<!DOCTYPE html>
<html>
<head>
<title>AI Drawing Studio</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}
canvas{
background:white;
border:2px solid white;
}
button{
padding:10px 20px;
margin:10px;
}
</style>
</head>
<body>

<h1>AI Drawing Studio</h1>

<canvas id="draw" width="350" height="400"></canvas>
<br>
<button onclick="generate()">Generate 3D</button>

<p id="result"></p>

<script>
const canvas=document.getElementById("draw");
const ctx=canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("mousedown",()=>{
drawing=true;
});

canvas.addEventListener("mouseup",()=>{
drawing=false;
ctx.beginPath();
});

canvas.addEventListener("mousemove",(e)=>{
if(!drawing)return;
ctx.lineWidth=4;
ctx.lineCap="round";
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
});

function generate(){
document.getElementById("result").innerHTML=
"AI 3D Generation Coming Soon...";
}
</script>

</body>
</html>
